    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const limaPath = document.getElementById('lima');
            const modal = document.querySelector('.container-modal');

            limaPath.addEventListener('mouseenter', function () {
                modal.classList.add('show');
            });

            limaPath.addEventListener('mouseleave', function () {
                modal.classList.remove('show');
            });
        });

        document.addEventListener('DOMContentLoaded', function () {
            const piuraPath = document.getElementById('piura');
            const modalPiura = document.querySelector('.container-modal3');

            piuraPath.addEventListener('mouseenter', function () {
                modalPiura.classList.add('show-piura');
            });

            piuraPath.addEventListener('mouseleave', function () {
                modalPiura.classList.remove('show-piura');
            });
        });
        document.addEventListener('DOMContentLoaded', function () {
            const tumbesPath = document.getElementById('tumbes');
            const modalPumbes = document.querySelector('.container-modal4');

            tumbesPath.addEventListener('mouseenter', function () {
                modalPumbes.classList.add('show-tumbes');
            });

            tumbesPath.addEventListener('mouseleave', function () {
                modalPumbes.classList.remove('show-tumbes');
            });
        });

        document.addEventListener('DOMContentLoaded', function () {
            const punoPath = document.getElementById('puno');
            const modalPuno = document.querySelector('.container-modal2');

            punoPath.addEventListener('mouseenter', function () {
                modalPuno.classList.add('show-puno');
            });

            punoPath.addEventListener('mouseleave', function () {
                modalPuno.classList.remove('show-puno');
            });
        });

        document.addEventListener('DOMContentLoaded', function () {
            const cuscoPath = document.getElementById('cusco');
            const modalCusco = document.querySelector('.container-modal1');

            cuscoPath.addEventListener('mouseenter', function () {
                modalCusco.classList.add('show-cusco');
            });

            cuscoPath.addEventListener('mouseleave', function () {
                modalCusco.classList.remove('show-cusco');
            });
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap');


        body {
            background-color: #F8F5F0;
            font-family: 'Cormorant Garamond', Georgia, serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }



        
        .container-modal{
            position: relative;
        }
        .containerModalDistritos{
            left: 50px;
            position: absolute;
            background-color: white;
            border-radius: 10px;
            width: 250px;
        }

        .titleHeader{
            background-color: #f86c6c;
            padding: 10px;
            color: white;
            font-weight: bolder;
            font-size: 40px;
            border-radius: 10px 10px 0 0;
        }

        span{
            color:rgb(65, 27, 27);
            font-size: 20px;
            font-weight: bold;
                
        }

        .container {
            width: 45%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container path {
            fill: #e9d8d8;
            stroke: rgb(241, 241, 241);
            stroke-width: 2px;

        }


        .iconoUbicacion {
            position: relative;

        }

        .iconoUbicacion i {
            font-size: 40px;
            color: rgb(138, 70, 90);
        }

        .iconoUbicacion .icon-lima {
            position: absolute;
            top: 1.2em;
            left: 9.5em;
        }

        .iconoUbicacion .icon-cusco {
            position: absolute;
            top: 3.5em;
            left: 14.8em;
        }






        .container .madre-de-dios,
        .container .loreto,
        .container .moquegua,
        .container .callao,
        .container .ancash,
        .container .la-libertad,
        .container .lambayeque,
        .container .cusco,
        .container .ayacucho,
        .container .apurimac,
        .container .huancavelica,
        .container .san-martin,
        .container .huanuco,
        .container .pasco,
        .container .ucayali,
        .container .junin,
        .container .tacna {
            z-index: 2;
        }

        .container .amazonas,
        .container .cajamarca,
        .container .arequipa,
        .container .ica,
        .container .piura,
        .container .tumbes,
        .container .lima-provincia,
        .container .cusco,
        .container .puno,
        .container .lima {
            fill: #ebc1c1;
            transition: transform 0.3s ease, fill 0.3s ease;
            transform-box: fill-box;
            transform-origin: center;
        }


        .container .amazonas:hover,
        .container .cajamarca:hover,
        .container .arequipa:hover,
        .container .ica:hover,
        .container .piura:hover,
        .container .puno:hover,
        .container .tumbes:hover,
        .container .lima-provincia:hover,
        .container .lima:hover,
        .container .cusco:hover {

            fill: rgb(236, 192, 134);
            cursor: pointer;
            transform: scale(1.05);
            filter: drop-shadow(0px 0px 5px rgba(0, 0, 0, 0.3));
        }



        /* CONTAINER  MODAL */
        .container-message {
            position: relative;
        }

        .container-message1 {
            position: relative;
        }


        .container-modal4,
        .container-modal3,
        .container-modal2,
        .container-modal1,
        .container-modal {
            position: absolute;
            background-color: rgb(255, 255, 255);
            padding: 30px;
            width: 310px;
            display: none;
            border-radius: 2px;
            /* box-shadow: 4px 3px 10px rgb(134, 134, 134);  */

        }

        .container-modal1 {
            right: 0;
            top: 14em;
        }

        .container-modal2 {
            right: 0;
            top: 20em;
        }

        .container-modal3 {
            left: 100px;
        }

        .imagen-destinos {
            width: 300px;
        }


        .show,
        .show-tumbes,
        .show-puno,
        .show-piura,
        .show-cusco {
            display: block;
        }

        .container-titulo-disttrito {
            width: 100%;
            height: 60px;
            border-bottom: 1px solid rgb(209, 142, 41);

        }

        .text-comdal-title {
            font-size: 29px;
            text-align: start;
            color: rgb(82, 39, 39);
            font-weight: 800;
        }

        ul li {
            font-size: 10px;
        }

        strong {
            color: rgb(82, 39, 39);
        }
    </style>

</body>
